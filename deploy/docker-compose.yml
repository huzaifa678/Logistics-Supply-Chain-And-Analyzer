services:
  neo4j:
    image: neo4j:5-community
    container_name: logistics-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/please-change-me
      NEO4J_PLUGINS: '["graph-data-science"]'   # enables GDS for analytics
    volumes:
      - neo4j_data:/data
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "please-change-me", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: huzaifagill234/logistics-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: logistics-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Auth__BootstrapSecret: "dev-bootstrap-secret-change-me"
    networks:
      - logistics-net
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    image: huzaifagill234/frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: logistics-frontend
    ports:
      - "4000:4000"
    environment:
      # Angular v20+ SSR validates the Host header against allowedHosts (DNS-rebinding guard);
      # the build bakes in an empty list, which rejects every host. Allow all behind the proxy.
      NG_ALLOWED_HOSTS: "*"
    networks:
      - logistics-net
    depends_on:
      - api

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: logistics-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "8081:8081"   
    networks:
      - logistics-net

  nginx:
    image: nginx:1.27-alpine
    container_name: logistics-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - logistics-net
    depends_on:
      - api
      - frontend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: logistics-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  logistics-net:
    driver: bridge

volumes:
  neo4j_data:
  redis_data:
