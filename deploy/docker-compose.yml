services:
  neo4j:
    image: neo4j:5-community
    container_name: logistics-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/please-change-me
      NEO4J_PLUGINS: '["graph-data-science"]'   # enables GDS for analytics
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "please-change-me", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: logistics-api
    ports:
      - "8080:8080"
    environment:
      # Infra URLs come from appsettings.Docker.json (service names on this network).
      # Override any single value here if needed — env vars still win over the JSON file.
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: logistics-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "8081:8081"   # built-in Schema Registry

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: logistics-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  redis_data:
