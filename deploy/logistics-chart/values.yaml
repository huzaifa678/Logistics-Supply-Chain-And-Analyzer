# ----------------------------------------------------------------------------
# First-party workloads (our images get templates under templates/).
# ----------------------------------------------------------------------------
api:
  image:
    repository: huzaifagill234/logistics-api
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # Readiness = Neo4j reachable; liveness = process up. See the API's /health endpoints.
  probes:
    readiness:
      path: /health/ready
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      path: /health/live
      initialDelaySeconds: 20
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      path: /health/live
      periodSeconds: 5
      failureThreshold: 30

frontend:
  image:
    repository: huzaifagill234/logistics-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  containerPort: 4000
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  probes:
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 15

ingress:
  enabled: true
  className: nginx
  host: logistics.local
  annotations: {}

# ----------------------------------------------------------------------------
# Application config consumed by the API (rendered into a ConfigMap + Secret).
# Hosts default to the subchart service names for this release; override if needed.
# ----------------------------------------------------------------------------
config:
  aspnetcoreEnvironment: Production
  neo4j:
    host: ""        # default: <release>-neo4j
    database: neo4j
  redis:
    host: ""        # default: <release>-redis-master
  rabbitmq:
    enabled: true
    host: ""        # default: <release>-rabbitmq
  kafka:
    enabled: true   # Avro event bus on; schema-registry subchart is enabled below
    bootstrap: ""   # default: <release>-kafka:9092
    schemaRegistryUrl: ""  # default: http://<release>-schema-registry:8081
  rateLimiting:
    enabled: true

# Secrets (rendered into a Secret). REPLACE for production; keep in sync with subchart auth.
# All credentials live in ONE Opaque Secret (templates/secrets.yaml). The API reads from it
# via secretKeyRef and the subcharts via their *.existingSecret settings below — so no plaintext
# password is ever passed into a subchart's values. REPLACE these for production (or bring your
# own Secret: set create=false and point existingSecretName at it).
secrets:
  create: true
  # FIXED name (subchart values can't reference .Release.Name). Change only if you bring your own.
  existingSecretName: logistics-credentials
  neo4jPassword: "please-change-me"
  rabbitmqPassword: "guest"
  rabbitmqErlangCookie: "dev-only-erlang-cookie-change-me"
  jwtSigningKey: "dev-only-signing-key-change-me-min-32-bytes-long!!"

# ----------------------------------------------------------------------------
# Dependency subcharts (datastores & brokers). Values below are passed through.
# Dev-grade defaults — harden (auth, persistence, replicas) for production.
# ----------------------------------------------------------------------------
neo4j:
  enabled: true
  # Skip the cluster lookup that validates passwordFromSecret exists — our Secret is created
  # in the SAME release, so it isn't present when neo4j's templates render (and lookups don't
  # run under `helm template`/dry-run at all).
  disableLookups: true
  neo4j:
    name: neo4j
    # Password sourced from the shared Secret (key NEO4J_AUTH = "neo4j/<pass>").
    # Do NOT also set neo4j.password — the chart rejects setting both.
    passwordFromSecret: logistics-credentials
  volumes:
    data:
      mode: defaultStorageClass

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false                 # dev: no Redis password

rabbitmq:
  enabled: true
  auth:
    username: guest
    existingPasswordSecret: logistics-credentials       # key: rabbitmq-password
    existingErlangSecret: logistics-credentials          # key: rabbitmq-erlang-cookie

kafka:
  enabled: true                    
  controller:
    replicaCount: 1
  listeners:
    client:
      protocol: PLAINTEXT          # dev: no SASL/TLS

schema-registry:
  enabled: true
