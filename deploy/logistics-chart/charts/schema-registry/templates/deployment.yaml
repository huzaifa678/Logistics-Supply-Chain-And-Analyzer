{{- if .Values.enabled -}}
{{- $bootstrap := .Values.kafkaBootstrap | default (printf "%s-kafka:9092" .Release.Name) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-schema-registry
  labels:
    app.kubernetes.io/name: schema-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: schema-registry
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: schema-registry
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: schema-registry
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: schema-registry
    spec:
      containers:
        - name: schema-registry
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: {{ .Release.Name }}-schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "PLAINTEXT://{{ $bootstrap }}"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:{{ .Values.port }}"
          readinessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-schema-registry
  labels:
    app.kubernetes.io/name: schema-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: schema-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
{{- end }}
