apiVersion: v2
name: logistics
description: Supply Chain Logistics & Analyzer — API + Angular frontend, with Neo4j, Redis, RabbitMQ and Kafka as chart dependencies.
type: application
version: 0.1.0
appVersion: "1.0.0"

# Datastores and brokers are pulled in as upstream subcharts (no hand-written manifests).
# Each is gated by a `*.enabled` value so you only deploy what you use.
# Run `helm dependency update deploy/helm/logistics` to fetch these into charts/.
dependencies:
  - name: neo4j
    version: "5.26.2"
    repository: "https://helm.neo4j.com/neo4j"
    condition: neo4j.enabled

  - name: redis
    version: "20.13.4"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled

  - name: rabbitmq
    version: "15.5.5"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: rabbitmq.enabled

  - name: kafka
    version: "32.4.5"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: kafka.enabled

  # Local subchart (vendored under charts/) — no external repo. Provides the Schema Registry
  # the Avro event bus needs, wired to the Kafka subchart above.
  - name: schema-registry
    version: "0.1.0"
    repository: "file://charts/schema-registry"
    condition: schema-registry.enabled
